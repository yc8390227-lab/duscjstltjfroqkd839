<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <!-- 브라우저 캐시 최소화 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <!-- 리디렉션 대상 -->
    <meta http-equiv="refresh" content="0; url=t1.jpg">

    <title>Redirecting...</title>

    <script>
        // JavaScript가 활성화된 경우 즉시 이동
        window.location.replace("t1.jpg");
    </script>
</head>
<body>
    <p>이미지로 이동 중입니다...</p>
    <p>
        자동으로 이동하지 않으면
        <a href="t1.jpg">여기를 클릭하세요.</a>
    </p>
</body>
</html>
